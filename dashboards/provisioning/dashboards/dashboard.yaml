apiVersion: 1

providers:
  - name: DARAMS Dashboards
    orgId: 1
    folder: DARAMS
    folderUid: darams_folder
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
