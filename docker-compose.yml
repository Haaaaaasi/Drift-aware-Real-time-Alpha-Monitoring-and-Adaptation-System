services:
  dolphindb:
    image: dolphindb/dolphindb:v2.00.18
    container_name: darams-dolphindb
    ports:
      - "8848:8848"
    volumes:
      - dolphindb_data:/data
      - ./dolphindb/scripts:/scripts
      - ./dolphindb/modules:/modules
    environment:
      - MAX_MEM_SIZE=4
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: darams-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: darams
      POSTGRES_USER: darams
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-darams_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: darams-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: darams-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/home.json
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning: datasources (PostgreSQL connection)
      - ./dashboards/provisioning/datasources:/etc/grafana/provisioning/datasources
      # Provisioning: dashboard provider config
      - ./dashboards/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      # Dashboard JSON files
      - ./dashboards:/var/lib/grafana/dashboards
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  dolphindb_data:
  postgres_data:
  redis_data:
  grafana_data:
